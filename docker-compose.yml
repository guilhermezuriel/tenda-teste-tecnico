version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tenda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenda_desafio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - tenda_postgres_data:/var/lib/postgresql/data
    networks:
      - tenda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenda_desafio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenda-coupon-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tenda_desafio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SQL_INIT_MODE: always
    ports:
      - "8080:8080"
    networks:
      - tenda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 60s

networks:
  tenda-network:
    driver: bridge

volumes:
  tenda_postgres_data:
    driver: local